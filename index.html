<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach-Cockpit — Prototyp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1C2B39;
    --ink-light:#2E4356;
    --paper:#F3F4F1;
    --paper-card:#FFFFFF;
    --line:#DEDFDC;
    --line-strong:#C7C9C4;
    --text:#1C2B39;
    --text-muted:#6B7280;
    --text-faint:#9CA3AF;
    --brand:#2454A6;
    --brand-dim:#E7EEF8;
    --signal:#B5453E;
    --signal-dim:#F6E5E3;
    --progress:#4C7A5E;
    --progress-dim:#E7F0EA;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 32px;
    border-bottom:1px solid var(--line);
    background:var(--paper-card);
  }
  .brand-mark{display:flex;align-items:center;gap:12px;}
  .brand-mark .glyph{
    width:32px;height:32px;border-radius:8px;
    background:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .brand-mark .glyph svg{width:16px;height:16px;}
  .brand-mark .name{font-size:15px;font-weight:600;letter-spacing:-0.01em;}
  .brand-mark .sub{font-size:12px;color:var(--text-muted);}
  .coach-id{display:flex;align-items:center;gap:10px;}
  .coach-avatar{
    width:34px;height:34px;border-radius:50%;
    background:var(--brand-dim);color:var(--brand);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;font-family:'Space Grotesk',sans-serif;
  }

  .layout{
    display:grid;
    grid-template-columns:300px 1fr;
    min-height:calc(100vh - 73px);
  }

  .roster{
    border-right:1px solid var(--line);
    padding:24px 16px;
    background:var(--paper-card);
  }
  .roster-head{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:0 8px 16px;
  }
  .roster-head h2{
    font-size:13px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--text-muted);font-weight:600;margin:0;
  }
  .roster-head .count{font-size:12px;color:var(--text-faint);}

  .client-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 10px;border-radius:10px;
    cursor:pointer;margin-bottom:2px;
    border:1px solid transparent;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .client-row:hover{background:var(--paper);}
  .client-row.active{background:var(--brand-dim);border-color:var(--brand);}
  .client-row .dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .dot.signal{background:var(--signal);}
  .dot.progress{background:var(--progress);}
  .dot.neutral{background:var(--text-faint);}
  .client-row .info{flex:1;min-width:0;}
  .client-row .cname{font-size:13.5px;font-weight:500;margin:0 0 2px;}
  .client-row .cmeta{font-size:11.5px;color:var(--text-muted);margin:0;}
  .client-row .flag{
    font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;
    background:var(--signal-dim);color:var(--signal);
    letter-spacing:0.02em;flex-shrink:0;
  }

  .detail{
    padding:32px 40px;max-width:920px;
    transition:opacity 0.1s ease;
  }

  .client-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:28px;
  }
  .client-header .who{display:flex;align-items:center;gap:14px;}
  .avatar-lg{
    width:48px;height:48px;border-radius:50%;
    background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;
  }
  .client-header h1{font-size:20px;margin:0 0 3px;letter-spacing:-0.01em;}
  .client-header .meta{font-size:13px;color:var(--text-muted);margin:0;}

  .btn{
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
    padding:9px 16px;border-radius:8px;border:1px solid var(--line-strong);
    background:var(--paper-card);color:var(--text);cursor:pointer;
  }
  .btn:hover{border-color:var(--ink);}

  .instrument-row{
    display:grid;grid-template-columns:220px 1fr;gap:24px;
    margin-bottom:32px;
  }

  .gauge-card{
    background:var(--ink);border-radius:16px;padding:20px;
    display:flex;flex-direction:column;align-items:center;
  }
  .gauge-label{
    font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
    color:#8FA3B8;margin:0 0 8px;align-self:flex-start;
  }
  .gauge-value{
    font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:600;
    color:#fff;margin:6px 0 0;
  }
  .gauge-value span{font-size:15px;color:#8FA3B8;font-weight:400;}
  .gauge-sub{font-size:11px;color:#B7A99C;margin:2px 0 0;}

  .signal-card{
    background:var(--signal-dim);border-radius:16px;padding:20px;
    display:flex;flex-direction:column;justify-content:center;
    border-left:3px solid var(--signal);
  }
  .signal-card.ok{
    background:var(--progress-dim);
    border-left-color:var(--progress);
  }
  .signal-card .tag{
    font-size:11px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--signal);font-weight:600;margin:0 0 6px;
  }
  .signal-card.ok .tag{color:var(--progress);}
  .signal-card .title{font-size:16px;font-weight:600;margin:0 0 4px;color:#5C2622;}
  .signal-card.ok .title{color:#1E4D30;}
  .signal-card .sub{font-size:12.5px;color:#7A3A34;margin:0;}
  .signal-card.ok .sub{color:#3A6B4E;}

  .section-label{
    font-size:12px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--text-muted);font-weight:600;margin:0 0 14px;
  }

  .timeline{margin-bottom:32px;}
  .tl-row{
    display:grid;grid-template-columns:70px 1fr 90px;gap:16px;
    padding:14px 0;border-bottom:1px solid var(--line);align-items:baseline;
  }
  .tl-row:last-child{border-bottom:none;}
  .tl-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-muted);}
  .tl-text{font-size:13.5px;line-height:1.5;}
  .tl-score{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right;}
  .tl-score.low{color:var(--signal);}
  .tl-score.ok{color:var(--text-muted);}

  .trend-wrap{
    background:var(--paper-card);border:1px solid var(--line);
    border-radius:16px;padding:22px 26px;
  }
  .trend-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .trend-head .arrow{font-size:13px;font-weight:600;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px;}

  @media (max-width:800px){
    .layout{grid-template-columns:1fr;}
    .roster{border-right:none;border-bottom:1px solid var(--line);}
    .instrument-row{grid-template-columns:1fr;}
    .topbar{padding:14px 20px;}
    .detail{padding:20px 16px;}
    .client-header{flex-wrap:wrap;gap:12px;}
    .client-header .btn{align-self:flex-start;}
    .tl-row{grid-template-columns:58px 1fr 72px;gap:10px;}
    .trend-wrap{padding:16px 14px;}
    .gauge-card{padding:16px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-mark">
    <div class="glyph">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 20L12 4L20 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div>
      <p class="name">Coach&#8209;Cockpit</p>

<div class="layout">
  <div class="roster">

      <span class="count" id="roster-count"></span>
    </div>
    <div id="roster-list"></div>
  </div>
  <div class="detail" id="detail"></div>
</div>

<script>
const CLIENTS = [

      { date: '19.06.', text: 'Einstieg okay, aber Zeitmanagement ist schwierig.', score: 3 },
    ],

    trendText: '\u2198 sinkend \u2014 Abw\u00e4rtstrend letzte 4 Screenings',
  },
];

function gaugeParams(kks) {
  const p = Math.max(0, Math.min(1, kks / 165));
  // Semicircle arc length: π × r = π × 55 ≈ 172.79
  const arcLen = Math.PI * 55;
  // Needle: default line points LEFT (x2=28). Rotate CCW by p×180° to go LEFT→UP→RIGHT.
  // SVG rotate() is clockwise-positive, so CCW = negative degrees.
  const rotateDeg = (-p * 180).toFixed(2);
  const sub = kks <= 40 ? 'Aufholbedarf' : kks <= 80 ? 'Im Aufbau' : kks <= 120 ? 'Gute Basis' : 'Spitzenbereich';
  return {
    arcFilled: (p * arcLen).toFixed(2),
    arcTotal: arcLen.toFixed(2),
    rotateDeg,
    sub,
  };
}

function trendColor(dir) {
  if (dir === 'up') return 'var(--progress)';
  if (dir === 'down') return 'var(--signal)';
  return 'var(--text-muted)';
}

function renderDetail(c) {
  const g = gaugeParams(c.kks);

  const signalHTML = c.signal
    ? `<div class="signal-card">
        <p class="tag">Aktives Signal</p>
        <p class="title">${c.signal.title}</p>
        <p class="sub">${c.signal.sub}</p>
       </div>`
    : `<div class="signal-card ok">
        <p class="tag">Signal-Status</p>
        <p class="title">Kein aktives Signal</p>
        <p class="sub">Letzter Check-in unauf\u00e4llig \u00b7 weiter beobachten</p>
       </div>`;

  const checkinsHTML = c.checkins.map(ci => {
    const cls = ci.score <= 2 ? 'low' : 'ok';
    return `<div class="tl-row">
      <span class="tl-date">${ci.date}</span>
      <span class="tl-text">${ci.text}</span>
      <span class="tl-score ${cls}">Befinden ${ci.score}/5</span>
    </div>`;
  }).join('');

  const col = trendColor(c.trendDir);

  return `
    <div class="client-header">
      <div class="who">
        <div class="avatar-lg">${c.initials}</div>
        <div>
          <h1 class="display">${c.name}</h1>
          <p class="meta">Coaching seit ${c.since} &middot; Woche ${c.week} &middot; Coach: Silvester</p>
        </div>
      </div>
      <button class="btn">Notiz hinzuf\u00fcgen</button>
    </div>

    <div class="instrument-row">
      <div class="gauge-card">
        <p class="gauge-label display">KKS&#8209;Score</p>
        <svg width="140" height="90" viewBox="0 0 140 90">
          <!-- background track -->
          <path d="M 15 80 A 55 55 0 0 1 125 80" fill="none" stroke="#2E4356" stroke-width="10" stroke-linecap="round"/>
          <!-- filled portion: stroke-dasharray fills from left (low score) to right (high score) -->
          <path d="M 15 80 A 55 55 0 0 1 125 80" fill="none" stroke="#B7A99C" stroke-width="10" stroke-linecap="round"
                stroke-dasharray="${g.arcFilled} ${g.arcTotal}"/>
          <!-- needle: points left by default, rotated CCW proportional to score -->
          <g transform="rotate(${g.rotateDeg}, 70, 80)">
            <line x1="70" y1="80" x2="28" y2="80" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          </g>
          <circle cx="70" cy="80" r="4" fill="#fff"/>
        </svg>
        <p class="gauge-value mono">${c.kks}<span>/165</span></p>
        <p class="gauge-sub">${g.sub}</p>
      </div>
      ${signalHTML}
    </div>

    <p class="section-label">Check-in-Verlauf</p>
    <div class="timeline">${checkinsHTML}</div>

    <div class="trend-wrap">
      <div class="trend-head">
        <p class="section-label" style="margin:0;">KKS&#8209;Verlauf</p>
        <span class="arrow" style="color:${col}">${c.trendText}</span>
      </div>
      <svg width="100%" height="90" viewBox="0 0 820 90" preserveAspectRatio="none">
        <polyline points="${c.trendPts}" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
}

function renderRoster(activeId) {
  return CLIENTS.map(c => {
    const flagHTML = c.flag ? `<span class="flag">${c.flag}</span>` : '';
    return `<div class="client-row${c.id === activeId ? ' active' : ''}" data-id="${c.id}">
      <span class="dot ${c.dotClass}"></span>
      <div class="info">
        <p class="cname">${c.name}</p>
        <p class="cmeta">KKS ${c.kks} &middot; ${c.trendLabel}</p>
      </div>
      ${flagHTML}
    </div>`;
  }).join('');
}

let activeId = 'markus';

function selectClient(id) {
  activeId = id;
  document.querySelectorAll('.client-row').forEach(row => {
    row.classList.toggle('active', row.dataset.id === id);
  });
  const detail = document.getElementById('detail');
  detail.style.opacity = '0';
  setTimeout(() => {
    const client = CLIENTS.find(c => c.id === id);
    detail.innerHTML = renderDetail(client);
    detail.style.opacity = '1';
    if (window.innerWidth <= 800) {
      detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 110);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('roster-count').textContent = CLIENTS.length;
  document.getElementById('roster-list').innerHTML = renderRoster(activeId);

  const initial = CLIENTS.find(c => c.id === activeId);
  document.getElementById('detail').innerHTML = renderDetail(initial);

  document.getElementById('roster-list').addEventListener('click', e => {
    const row = e.target.closest('[data-id]');
    if (row && row.dataset.id !== activeId) {
      selectClient(row.dataset.id);
    }
  });
});
</script>

</html>
